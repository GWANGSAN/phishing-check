<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 예방 진단 시스템</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", Arial;
    background:#eef2f6;
    font-size:20px;
}

.header{
    background:#002b5c;
    color:white;
    padding:22px;
    text-align:center;
    font-weight:900;
    font-size:26px;
}

.container{
    max-width:650px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:14px;
    padding:26px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
}

h2{ color:#002b5c; font-size:26px; }

button{
    width:100%;
    padding:18px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
}

.primary{background:#002b5c;color:white;}
.video{background:#c62828;color:white;}
.gray{background:#777;color:white;}
.green{background:#2e7d32;color:white;}

.caseBox{
    margin-top:15px;
    background:#fff7e6;
    border-left:6px solid #ff9800;
    padding:16px;
    border-radius:10px;
    font-size:18px;
}

.caseItem{
    background:#fff;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    font-size:18px;
    border:1px solid #eee;
}

.hidden{display:none;}

#question{
    font-size:26px;
    font-weight:900;
    margin:25px 0;
}

.choiceBtn{
    background:#1565c0;
    color:white;
    font-size:20px;
    padding:16px;
}

.descBox{
    margin-top:10px;
    padding:14px;
    background:#eef5ff;
    display:none;
    border-radius:8px;
    font-size:18px;
}

.progressBox{
    background:#ddd;
    border-radius:10px;
    margin-top:15px;
}

.progressBar{
    height:22px;
    width:0%;
    background:#c62828;
    transition:0.3s;
}

#preventionMsg{
    margin-top:14px;
    padding:14px;
    background:#eef6ff;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="header">🚔 광주광산경찰서 피싱범죄수사팀</div>

<div class="container">
<div class="card">

<!-- INTRO -->
<div id="intro">

<h2>📢 보이스피싱 진단</h2>

<p>보이스피싱 위험도를 분석하기 위한 진단프로그램입니다.
  영상 시청후 진단 시작을 시작해 주세요.</p>

<!-- ⚠️ 영상 코드는 절대 변경 금지 -->
<button class="video" id="videoBtn">▶ 영상 시청</button>

<div class="caseBox">
<div class="caseItem">검찰 사칭 - 1억 원 피해/자산검수</div>
<div class="caseItem">대출 사기 - 3,000만 원 피해/계약위반</div>
</div>

<button class="primary" id="startBtn">진단 시작</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>
<div id="descBox" class="descBox"></div>
<button id="nextBtn" class="primary hidden">다음</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">

<h2>결과</h2>

<div class="progressBox">
<div id="progressBar" class="progressBar"></div>
</div>

<div id="result"></div>
<div id="scoreText"></div>

<div id="preventionMsg"></div>

<button class="green" onclick="downloadTool()">
피해예방안내
</button>

<button class="gray" onclick="location.reload()">다시 시작</button>

</div>

</div>
</div>

<script>

/* =========================
   질문 (원본 유지 구조)
========================= */

const questions = [
{
 q:"카드 배송 또는 카드 발급 전화를 받은 적이 있습니까?",
 choices:["예","아니오"],
 answer:1,
 risk:1,
 desc:"카드 사칭은 대표적 보이스피싱입니다."
},
{
 q:"금융기관 또는 검찰을 사칭한 전화를 받았습니까?",
 choices:["예","아니오"],
 answer:1,
 risk:3,
 desc:"기관 사칭은 매우 위험합니다."
},
{
 q:"현금 전달 또는 계좌이체 요구를 받았습니까?",
 choices:["예","아니오"],
 answer:1,
 risk:5,
 desc:"즉시 사기 상황입니다."
}
];

let index = 0;
let score = 0;

const intro = document.getElementById("intro");
const quiz = document.getElementById("quiz");
const nextBtn = document.getElementById("nextBtn");

/* =========================
   시작
========================= */
document.getElementById("startBtn").onclick = () => {
    intro.classList.add("hidden");
    quiz.classList.remove("hidden");
    index = 0;
    score = 0;
    loadQ();
};

/* =========================
   질문 로딩 (안정화 패치)
========================= */
function loadQ(){

    const q = questions[index];

    if(!q){
        result();
        return;
    }

    document.getElementById("question").innerText = q.q;

    const c = document.getElementById("choices");
    c.innerHTML = "";

    q.choices.forEach((t,i)=>{
        let b = document.createElement("button");
        b.className = "choiceBtn";
        b.innerText = t;

        b.onclick = () => answer(i);

        c.appendChild(b);
    });

    document.getElementById("descBox").style.display = "none";
    nextBtn.classList.add("hidden");
}

/* =========================
   답변 처리 (오류 방지)
========================= */
function answer(i){

    const q = questions[index];

    if(i !== q.answer){
        score += q.risk;
    }

    document.getElementById("descBox").innerText = q.desc;
    document.getElementById("descBox").style.display = "block";

    nextBtn.classList.remove("hidden");
}

/* =========================
   다음 질문 (안정 패치)
========================= */
nextBtn.onclick = () => {
    index++;

    if(index >= questions.length){
        result();
    } else {
        loadQ();
    }
};

/* =========================
   결과
========================= */
function result(){

    quiz.classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    let max = questions.reduce((a,b)=>a+b.risk,0);
    let percent = (score / max) * 100;

    document.getElementById("progressBar").style.width = percent + "%";

    let msg =
        percent >= 70 ? "🚨 매우 위험"
        : percent >= 40 ? "⚠️ 주의"
        : "✅ 안전";

    document.getElementById("result").innerText = msg;
    document.getElementById("scoreText").innerText =
        "위험도: " + percent.toFixed(1) + "%";

    document.getElementById("preventionMsg").innerHTML =
        percent >= 70
        ? "🚨 당신은 보이스피싱 피해자입니다."
        : percent >= 40
        ? "⚠️ 가족 또는 금융기관 확인 필요"
        : "✅ 현재는 안전하지만 지속적 주의 필요";
}

/* =========================
   영상 (절대 변경 금지)
========================= */
document.getElementById("videoBtn").onclick = function(){
    window.open("YOUR_EXISTING_VIDEO_URL", "_blank");
};

/* =========================
   다운로드 기능 (추가만)
========================= */
function downloadTool(){

    const url = "bit.ly/polm";

    const a = document.createElement("a");
    a.href = url;
    a.download = "악성어플추출프로그램.apk";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

</script>

</body>
</html>
