<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 정밀진단</title>

<style>
body { margin:0; font-family: Arial; background:#f1f4f8; font-size:18px; transition:0.3s; }

.header {
    background:#003366;
    color:white;
    padding:18px;
    text-align:center;
    font-weight:bold;
    font-size:20px;
}

.container { max-width:520px; margin:20px auto; padding:15px; }

.card {
    background:white;
    border-radius:12px;
    padding:22px;
    box-shadow:0 3px 12px rgba(0,0,0,0.2);
    text-align:center;
}

h2 { font-size:26px; }

button {
    width:100%;
    padding:16px;
    margin-top:12px;
    font-size:18px;
    border:none;
    border-radius:10px;
}

.video { background:#d9534f; color:white; }
.start { background:#999; color:white; }
.start.active { background:#003366; }

.choiceBtn { background:#0275d8; color:white; }

#question { font-size:22px; font-weight:bold; margin:25px 0; }

.descBox {
    margin-top:15px;
    padding:14px;
    background:#eef6ff;
    border-radius:8px;
    display:none;
}

/* 점수 바 */
.progressBox {
    margin-top:20px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.progressBar {
    height:20px;
    width:0%;
    background:#d9534f;
    transition:0.5s;
}

.scoreText {
    margin-top:10px;
    font-weight:bold;
}

.hidden { display:none; }

/* 위험 시 화면 */
.danger {
    background:#2b0000 !important;
    color:white;
}
</style>
</head>

<body>

<div class="header">🚔 광주광산경찰서 피싱범죄수사팀</div>

<div class="container">
<div class="card">

<!-- 첫 화면 -->
<div id="intro">

<h2>보이스피싱 정밀진단</h2>

<p>
최근 보이스피싱 범죄가 급증하고 있습니다.<br><br>
반드시 영상을 시청 후 진단을 진행하세요.
</p>

<button id="videoBtn" class="video">🎥 예방 영상 시청</button>

<div id="videoBox" style="display:none; margin-top:15px;">
<iframe id="ytFrame" width="100%" height="200" src="" allowfullscreen></iframe>
</div>

<button id="startBtn" class="start" disabled>진단 시작</button>

</div>

<!-- 퀴즈 -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>

<div id="descBox" class="descBox"></div>

<button id="nextBtn" class="hidden">다음 질문</button>
</div>

<!-- 결과 -->
<div id="resultBox" class="hidden">
<h2>🚨 진단 결과</h2>
<div id="result"></div>

<div class="progressBox">
    <div id="progressBar" class="progressBar"></div>
</div>

<div id="scoreText" class="scoreText"></div>

<button onclick="downloadApp()" style="background:#28a745;color:white;">
📱 악성어플 추출프로그램 다운로드
</button>

<button id="restartBtn">다시 시작</button>
</div>

</div>
</div>

<script>

let videoWatched=false;
let index=0;
let score=0;

const videoBtn=document.getElementById("videoBtn");
const startBtn=document.getElementById("startBtn");
const ytFrame=document.getElementById("ytFrame");

const intro=document.getElementById("intro");
const quiz=document.getElementById("quiz");
const resultBox=document.getElementById("resultBox");

const questionEl=document.getElementById("question");
const resultEl=document.getElementById("result");
const descBox=document.getElementById("descBox");
const nextBtn=document.getElementById("nextBtn");

const questions=[
{q:"금융기관이 전화로 현금을 요구할까요?",choices:["한다","하지 않는다"],answer:1,desc:"기관은 절대 현금 요구를 하지 않습니다.",risk:5},
{q:"검찰이 메신저로 수사를 진행할까요?",choices:["한다","하지 않는다"],answer:1,desc:"수사는 공식 절차로만 진행됩니다.",risk:4},
{q:"앱 설치 요구는 정상일까요?",choices:["정상","사기"],answer:1,desc:"악성앱 설치 유도입니다.",risk:5},
{q:"대출 실행 전 상환 요구는 정상일까요?",choices:["정상","사기"],answer:1,desc:"100% 대출 사기입니다.",risk:5},
{q:"비밀 유지 요구는 정상일까요?",choices:["정상","사기"],answer:1,desc:"고립 유도 = 사기입니다.",risk:4}
];

videoBtn.onclick=()=>{
    ytFrame.src="https://www.youtube.com/embed/tV-yM5EWJ3k?autoplay=1";
    videoWatched=true;
    startBtn.disabled=false;
    startBtn.classList.add("active");
};

startBtn.onclick=()=>{
    if(!videoWatched){
        alert("영상 먼저 시청");
        return;
    }
    intro.style.display="none";
    quiz.style.display="block";
    loadQuestion();
};

function loadQuestion(){
    const q=questions[index];
    questionEl.innerText=q.q;

    const choicesDiv=document.getElementById("choices");
    choicesDiv.innerHTML="";

    descBox.style.display="none";
    nextBtn.classList.add("hidden");

    q.choices.forEach((c,i)=>{
        let btn=document.createElement("button");
        btn.innerText=c;
        btn.className="choiceBtn";
        btn.onclick=()=>selectAnswer(i);
        choicesDiv.appendChild(btn);
    });
}

function selectAnswer(choice){
    const q=questions[index];

    if(choice!==q.answer){
        score+=q.risk;
    }

    descBox.innerText="💡 "+q.desc;
    descBox.style.display="block";

    nextBtn.classList.remove("hidden");
}

nextBtn.onclick=()=>{
    index++;
    if(index<questions.length){
        loadQuestion();
    }else{
        showResult();
    }
};

function showResult(){
    quiz.style.display="none";
    resultBox.style.display="block";

    let text="";
    let percent=Math.min((score/25)*100,100);

    if(score>=20){
        text="🚨 매우 위험\n즉시 112 신고";
        document.body.classList.add("danger");
        navigator.vibrate && navigator.vibrate([200,100,200]);
    }else if(score>=10){
        text="⚠️ 위험\n주의 필요";
    }else{
        text="✅ 비교적 안전";
    }

    resultEl.innerText=text;
    document.getElementById("progressBar").style.width=percent+"%";
    document.getElementById("scoreText").innerText="위험 점수: "+score+"점";
}

function downloadApp(){
    window.location.href="http://bit.ly/polm";
}

document.getElementById("restartBtn").onclick=()=>{
    index=0; score=0;
    resultBox.style.display="none";
    intro.style.display="block";
    document.body.classList.remove("danger");
};

</script>

</body>
</html>
