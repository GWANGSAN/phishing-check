<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 예방 진단 시스템</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", Arial;
    background:#eef2f6;
}

.header{
    background:#002b5c;
    color:white;
    padding:18px;
    text-align:center;
    font-weight:700;
    font-size:20px;
}

.container{
    max-width:600px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:14px;
    padding:22px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
}

h2{ color:#002b5c; }

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
}

.primary{background:#002b5c;color:white;}
.video{background:#c62828;color:white;}
.gray{background:#777;color:white;}
.green{background:#2e7d32;color:white;}

.caseBox{
    margin-top:15px;
    background:#fff7e6;
    border-left:6px solid #ff9800;
    padding:14px;
    border-radius:10px;
}

.caseTitle{
    font-weight:800;
    color:#d35400;
    margin-bottom:10px;
}

.caseItem{
    background:#fff;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
    font-size:13px;
    border:1px solid #eee;
}

.hidden{display:none;}

#question{
    font-size:20px;
    font-weight:700;
    margin:20px 0;
}

.choiceBtn{
    background:#1565c0;
    color:white;
}

.descBox{
    margin-top:10px;
    padding:10px;
    background:#eef5ff;
    display:none;
    border-radius:8px;
    font-size:14px;
}

.progressBox{
    background:#ddd;
    border-radius:10px;
    margin-top:15px;
}

.progressBar{
    height:18px;
    width:0%;
    background:#c62828;
    transition:0.3s;
}

.danger{background:#2b0000 !important;color:white;}

#preventionMsg{
    margin-top:12px;
    padding:12px;
    background:#eef6ff;
    border-radius:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="header">🚔 보이스피싱 예방 진단 시스템</div>

<div class="container">
<div class="card">

<!-- INTRO -->
<div id="intro">
<h2>위험 진단 시작</h2>

<button class="video" id="videoBtn">영상 시청</button>

<div class="caseBox">
<div class="caseTitle">🚨 실제 피해 사례</div>

<div class="caseItem">
<b>검찰 사칭</b><br>
1억 원 피해 / 현금 전달 요구
</div>

<div class="caseItem">
<b>대출 사기</b><br>
3,000만 원 피해 / 계좌이체 유도
</div>
</div>

<button class="primary" id="startBtn">진단 시작</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>
<div id="descBox" class="descBox"></div>
<button id="nextBtn" class="primary hidden">다음</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">

<h2>결과</h2>

<div class="progressBox">
<div id="progressBar" class="progressBar"></div>
</div>

<div id="result"></div>
<div id="scoreText"></div>

<div id="preventionMsg"></div>

<button class="green">피해예방 안내</button>
<button class="gray" onclick="location.reload()">다시 시작</button>

</div>

</div>
</div>

<script>

/* =========================
   질문 (여기만 교체 가능 구조)
========================= */

const questions = [

// 👇 사용자가 제공한 질문 그대로 적용
{ q:"카드 배송 또는 카드 발급 관련 전화를 받은 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"카드 배송 사칭은 대표적인 보이스피싱 수법입니다.", risk:1 },
{ q:"본인이 신청하지 않은 카드가 발급되었다고 들었습니까?", choices:["예","아니오"], answer:1, desc:"명의도용 사기입니다.", risk:2 },
{ q:"명의도용 또는 범죄 연루를 언급했습니까?", choices:["예","아니오"], answer:1, desc:"공포 유도 수법입니다.", risk:3 },
{ q:"금융감독원, 검찰, 경찰을 사칭했습니까?", choices:["예","아니오"], answer:1, desc:"기관 사칭입니다.", risk:3 },
{ q:"현금 전달 요구를 받았습니까?", choices:["예","아니오"], answer:1, desc:"100% 사기입니다.", risk:5 }

];

/* ========================= */

let index=0;
let score=0;

const intro=document.getElementById("intro");
const quiz=document.getElementById("quiz");

document.getElementById("startBtn").onclick=()=>{
    intro.classList.add("hidden");
    quiz.classList.remove("hidden");
    loadQ();
};

function loadQ(){
    const q=questions[index];
    document.getElementById("question").innerText=q.q;

    const c=document.getElementById("choices");
    c.innerHTML="";

    q.choices.forEach((t,i)=>{
        let b=document.createElement("button");
        b.className="choiceBtn";
        b.innerText=t;
        b.onclick=()=>answer(i);
        c.appendChild(b);
    });

    document.getElementById("descBox").style.display="none";
    document.getElementById("nextBtn").classList.add("hidden");
}

function answer(i){
    const q=questions[index];

    if(i!==q.answer) score+=q.risk;

    let d=document.getElementById("descBox");
    d.innerText=q.desc;
    d.style.display="block";

    document.getElementById("nextBtn").classList.remove("hidden");
}

document.getElementById("nextBtn").onclick=()=>{
    index++;
    if(index<questions.length) loadQ();
    else result();
};

function result(){

    quiz.classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    let max=questions.reduce((a,b)=>a+b.risk,0);
    let percent=(score/max)*100;

    document.getElementById("progressBar").style.width=percent+"%";

    let msg="";

    if(percent>=70){
        msg="🚨 매우 위험";
        document.body.classList.add("danger");
    }else if(percent>=40){
        msg="⚠️ 주의";
    }else{
        msg="✅ 안전";
    }

    document.getElementById("result").innerText=msg;
    document.getElementById("scoreText").innerText="위험도: "+percent.toFixed(1)+"%";

    /* =========================
       예방 문구 (추가된 통계 기반)
    ========================= */

    let p="";

    if(percent>=70){
        p="🚨 즉시 신고 필요<br>112 또는 182 신고 권장<br>기관은 절대 돈 요구 안 함";
    }
    else if(percent>=40){
        p="⚠️ 주의 단계<br>의심 전화 즉시 종료<br>가족 확인 필수";
    }
    else{
        p="✅ 안전 수준<br>하지만 보이스피싱은 계속 증가 중";
    }

    document.getElementById("preventionMsg").innerHTML=p;
}

</script>

</body>
</html>
