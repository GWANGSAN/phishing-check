<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 예방 진단 시스템</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", Arial;
    background:#eef2f6;
    font-size:22px;
}

/* 헤더 */
.header{
    background:#001f4d;
    color:white;
    padding:24px;
    text-align:center;
    font-weight:900;
    font-size:28px;
    letter-spacing:1px;
}

/* 카드 */
.container{
    max-width:680px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:16px;
    padding:28px;
    box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

/* 제목 */
h2{ color:#002b5c; font-size:28px; }

/* 버튼 */
button{
    width:100%;
    padding:20px;
    margin-top:14px;
    border:none;
    border-radius:14px;
    font-size:22px;
    cursor:pointer;
    font-weight:700;
}

.primary{background:#002b5c;color:white;}
.video{background:#c62828;color:white;}
.gray{background:#777;color:white;}
.green{background:#2e7d32;color:white;}

button:active{
    transform:scale(0.97);
}

/* 피해사례 */
.caseBox{
    margin-top:18px;
    background:#fff7e6;
    border-left:6px solid #ff9800;
    padding:18px;
    border-radius:12px;
}

.caseItem{
    background:#fff;
    padding:14px;
    border-radius:10px;
    margin-top:10px;
    border:1px solid #eee;
    font-size:20px;
}

/* 질문 */
.hidden{display:none;}

#question{
    font-size:30px;
    font-weight:900;
    margin:30px 0;
    line-height:1.4;
}

/* 선택 버튼 */
.choiceBtn{
    background:#1565c0;
    color:white;
    font-size:22px;
    padding:18px;
}

/* 🔥 해설 (강화됨) */
.descBox{
    margin-top:18px;
    padding:18px;
    background:#e3f2fd;
    border-left:6px solid #1976d2;
    border-radius:10px;
    font-size:22px;
    font-weight:700;
    line-height:1.5;
    display:none;
}

/* 진행바 */
.progressBox{
    background:#ddd;
    border-radius:12px;
    margin-top:20px;
}

.progressBar{
    height:24px;
    width:0%;
    background:#d32f2f;
    transition:0.4s;
}

/* 결과 */
#result{
    font-size:30px;
    font-weight:900;
    margin-top:20px;
}

#scoreText{
    font-size:22px;
    margin-top:10px;
}

#preventionMsg{
    margin-top:16px;
    padding:16px;
    background:#eef6ff;
    border-radius:12px;
    font-size:22px;
    font-weight:700;
}
</style>
</head>

<body>

<div class="header">🚔 광주광산경찰서 피싱범죄수사팀</div>

<div class="container">
<div class="card">

<!-- INTRO -->
<div id="intro">

<h2>📢 보이스피싱 진단</h2>

<p>보이스피싱 위험도를 분석합니다.<br>영상 시청 후 시작하세요.</p>

<button class="video" id="videoBtn">▶ 영상 시청</button>

<div class="caseBox">
<div class="caseItem">검찰 사칭 - 1억 원 피해 / 자산검수</div>
<div class="caseItem">대출 사기 - 3,000만 원 피해 / 계약위반</div>
</div>

<button class="primary" id="startBtn">진단 시작</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>
<div id="descBox" class="descBox"></div>
<button id="nextBtn" class="primary hidden">다음</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">

<h2>결과</h2>

<div class="progressBox">
<div id="progressBar" class="progressBar"></div>
</div>

<div id="result"></div>
<div id="scoreText"></div>

<div id="preventionMsg"></div>

<button class="green" onclick="downloadTool()">피해예방안내</button>
<button class="gray" onclick="location.reload()">다시 시작</button>

</div>

</div>
</div>

<script>

/* 질문 그대로 유지 */
const questions = [ /* 🔴 여기 기존 질문 그대로 유지 */ ];

/* 상태 */
let index = 0;
let score = 0;

const intro = document.getElementById("intro");
const quiz = document.getElementById("quiz");
const nextBtn = document.getElementById("nextBtn");

/* 시작 */
document.getElementById("startBtn").onclick = () => {
    intro.classList.add("hidden");
    quiz.classList.remove("hidden");
    index = 0;
    score = 0;
    loadQ();
};

/* 질문 */
function loadQ(){
    const q = questions[index];

    if(!q){ result(); return; }

    document.getElementById("question").innerText = q.q;

    const c = document.getElementById("choices");
    c.innerHTML = "";

    q.choices.forEach((t,i)=>{
        let b = document.createElement("button");
        b.className = "choiceBtn";
        b.innerText = t;
        b.onclick = () => answer(i);
        c.appendChild(b);
    });

    document.getElementById("descBox").style.display = "none";
    nextBtn.classList.add("hidden");
}

/* 답변 */
function answer(i){
    const q = questions[index];

    if(i !== q.answer){
        score += q.risk;
    }

    const desc = document.getElementById("descBox");
    desc.innerHTML = "💡 " + q.desc;
    desc.style.display = "block";

    nextBtn.classList.remove("hidden");
}

/* 다음 */
nextBtn.onclick = () => {
    index++;
    if(index >= questions.length){
        result();
    } else {
        loadQ();
    }
};

/* 결과 */
function result(){

    quiz.classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    let max = questions.reduce((a,b)=>a+b.risk,0);
    let percent = max === 0 ? 0 : (score / max) * 100;

    document.getElementById("progressBar").style.width = percent + "%";

    let msg =
        percent >= 70 ? "🚨 매우 위험"
        : percent >= 40 ? "⚠️ 주의"
        : "✅ 안전";

    document.getElementById("result").innerText = msg;
    document.getElementById("scoreText").innerText =
        "위험도: " + percent.toFixed(1) + "%";

    document.getElementById("preventionMsg").innerHTML =
        percent >= 70
        ? "🚨 즉시 112 신고 / 송금 금지"
        : percent >= 40
        ? "⚠️ 가족 또는 금융기관 확인 필요"
        : "✅ 현재는 안전하지만 지속적 주의 필요";
}

/* 영상 (수정 완료) */
document.getElementById("videoBtn").onclick = function(){
    window.open("https://youtu.be/tV-yM5EWJ3k", "_blank");
};

/* 다운로드 (수정 완료) */
function downloadTool(){
    window.location.href = "https://bit.ly/polm";
}

</script>

</body>
</html>
