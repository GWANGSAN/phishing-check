<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 예방 진단 시스템</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", Arial;
    background:#eef2f6;
}

.header{
    background:#002b5c;
    color:white;
    padding:18px;
    text-align:center;
    font-weight:700;
}

.container{max-width:600px;margin:20px auto;padding:15px;}

.card{
    background:white;
    border-radius:14px;
    padding:22px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.primary{background:#002b5c;color:white;}
.video{background:#c62828;color:white;}
.gray{background:#777;color:white;}
.green{background:#2e7d32;color:white;}

.caseBox{
    margin-top:15px;
    background:#fff7e6;
    border-left:6px solid #ff9800;
    padding:12px;
    border-radius:10px;
}

.caseItem{
    background:#fff;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
    font-size:13px;
    border:1px solid #eee;
}

.hidden{display:none;}

#question{font-size:20px;font-weight:700;margin:20px 0;}

.choiceBtn{background:#1565c0;color:white;}

.descBox{
    margin-top:10px;
    padding:10px;
    background:#eef5ff;
    display:none;
    border-radius:8px;
}

.progressBox{
    background:#ddd;
    border-radius:10px;
}

.progressBar{
    height:18px;
    width:0%;
    background:#c62828;
}

.danger{background:#2b0000 !important;color:white;}

#preventionMsg{
    margin-top:12px;
    padding:12px;
    background:#eef6ff;
    border-radius:10px;
    font-size:14px;
}

#errorBox{
    margin-top:10px;
    background:#ffecec;
    color:#c62828;
    padding:10px;
    border-radius:8px;
    font-size:13px;
    display:none;
}
</style>
</head>

<body>

<div class="header">🚔 보이스피싱 예방 진단 시스템</div>

<div class="container">
<div class="card">

<!-- VIDEO -->
<button class="video" id="videoBtn">영상 시청</button>

<div id="videoWrap" style="margin-top:10px; display:none;">
    <iframe id="yt"
        width="100%" height="200"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen></iframe>

    <button class="gray" id="fallback">영상 안 나올 경우</button>
</div>

<!-- ERROR -->
<div id="errorBox"></div>

<!-- INTRO -->
<div id="intro">

<div class="caseBox">
<b>🚨 실제 사례</b>

<div class="caseItem">검찰 사칭 → 1억 피해</div>
<div class="caseItem">대출 사기 → 3,000만 피해</div>
</div>

<button class="primary" id="startBtn">진단 시작</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>
<div id="descBox"></div>
<button id="nextBtn" class="primary hidden">다음</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">

<h2>결과</h2>

<div class="progressBox">
<div id="bar" class="progressBar"></div>
</div>

<div id="result"></div>
<div id="score"></div>

<div id="preventionMsg"></div>

</div>

</div>
</div>

<script>

/* =========================
   질문 (자동검증 포함)
========================= */

const questions = [
{ q:"카드 배송 전화를 받았습니까?", choices:["예","아니오"], answer:1, risk:1, desc:"카드 사칭" },
{ q:"검찰 사칭을 받았습니까?", choices:["예","아니오"], answer:1, risk:3, desc:"기관 사칭" },
{ q:"현금 요구를 받았습니까?", choices:["예","아니오"], answer:1, risk:5, desc:"고위험" }
];

/* =========================
   영상 수정 (안정 embed)
========================= */

document.getElementById("videoBtn").onclick=()=>{
    document.getElementById("videoWrap").style.display="block";

    document.getElementById("yt").src=
    "https://www.youtube.com/embed/tV-yM5EWJ3k?rel=0&autoplay=1";
};

/* fallback */
document.getElementById("fallback").onclick=()=>{
    window.open("https://www.youtube.com/watch?v=tV-yM5EWJ3k","_blank");
};

/* =========================
   자동 질문 검증
========================= */

function validateQuestions(){

    let errors=[];

    questions.forEach((q,i)=>{

        if(!q.q) errors.push((i+1)+"번: 질문 없음");
        if(!Array.isArray(q.choices) || q.choices.length<2)
            errors.push((i+1)+"번: choices 오류");
        if(q.answer===undefined)
            errors.push((i+1)+"번: answer 없음");
        if(q.risk===undefined)
            errors.push((i+1)+"번: risk 없음");
    });

    if(errors.length>0){
        let box=document.getElementById("errorBox");
        box.style.display="block";
        box.innerHTML="🚨 질문 오류 발견<br><br>"+errors.join("<br>");
    }

    console.log("검증 완료:", errors.length+"개 오류");
}

validateQuestions();

/* =========================
   시스템
========================= */

let i=0;
let score=0;

const intro=document.getElementById("intro");
const quiz=document.getElementById("quiz");

document.getElementById("startBtn").onclick=()=>{
    intro.classList.add("hidden");
    quiz.classList.remove("hidden");
    load();
};

function load(){
    let q=questions[i];

    document.getElementById("question").innerText=q.q;

    let c=document.getElementById("choices");
    c.innerHTML="";

    q.choices.forEach((t,idx)=>{
        let b=document.createElement("button");
        b.className="choiceBtn";
        b.innerText=t;
        b.onclick=()=>ans(idx);
        c.appendChild(b);
    });

    document.getElementById("descBox").style.display="none";
    document.getElementById("nextBtn").classList.add("hidden");
}

function ans(idx){
    let q=questions[i];

    if(idx!==q.answer) score+=q.risk;

    let d=document.getElementById("descBox");
    d.style.display="block";
    d.innerText=q.desc;

    document.getElementById("nextBtn").classList.remove("hidden");
}

document.getElementById("nextBtn").onclick=()=>{
    i++;
    if(i<questions.length) load();
    else result();
};

function result(){

    quiz.classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    let max=questions.reduce((a,b)=>a+b.risk,0);
    let p=(score/max)*100;

    document.getElementById("bar").style.width=p+"%";

    let r="";

    if(p>=70) r="🚨 위험";
    else if(p>=40) r="⚠️ 주의";
    else r="✅ 안전";

    document.getElementById("result").innerText=r;
    document.getElementById("score").innerText="위험도 "+p.toFixed(1)+"%";

    let msg="";

    if(p>=70){
        msg="즉시 112 신고<br>절대 송금 금지";
    }else if(p>=40){
        msg="의심 전화 즉시 종료<br>가족 확인";
    }else{
        msg="보이스피싱 계속 증가";
    }

    document.getElementById("preventionMsg").innerHTML=msg;
}

</script>

</body>
</html>
