<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 정밀 진단</title>

<style>
body { margin:0; font-family: Arial; background:#f1f4f8; }

.header {
    background:#003366;
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.container { max-width:520px; margin:20px auto; padding:15px; }

.card {
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 3px 12px rgba(0,0,0,0.2);
    text-align:center;
}

button {
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:16px;
    border:none;
    border-radius:8px;
}

.start { background:#003366; color:white; }
.yes { background:#d9534f; color:white; }
.no { background:#0275d8; color:white; }

#question { margin:20px 0; font-size:18px; }
#result { white-space:pre-line; text-align:left; margin-top:15px; }

img { width:100%; margin-top:15px; border-radius:8px; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="header">🚔 광주광산경찰서 피싱범죄수사팀</div>

<div class="container">
<div class="card">

<!-- 첫 화면 -->
<div id="intro">
<h2>보이스피싱 정밀 진단</h2>
<p>
최근 카드배송, 기관사칭, 원격제어 등을 이용한 보이스피싱이 증가하고 있습니다.<br><br>
간단한 질문을 통해 현재 상황의 위험도를 확인해보세요.
</p>
<button class="start" onclick="start()">진단 시작하기</button>
</div>

<!-- 질문 화면 -->
<div id="quiz" class="hidden">
<div id="progress"></div>
<div id="question"></div>
<button class="yes" onclick="answer(true)">예</button>
<button class="no" onclick="answer(false)">아니오</button>
</div>

<!-- 결과 화면 -->
<div id="resultBox" class="hidden">
<h2>진단 결과</h2>
<div id="result"></div>

<!-- 결과 이미지 -->
<img src="result.png" alt="예방 안내 이미지">

<button onclick="restart()">다시 시작</button>
</div>

</div>
</div>

<script>

const questions = [
"저금리, 정부지원, 소상공인, 대환대출 전화를 받은 적이 있습니까?",
"대출약정위반, 신용보증재단 보증금과 관련된 내용을 들은 적이 있습니까?",
"기존 대출금을 상환하지 않으면 대출이 실행되지 않는다는 내용을 들은 적이 있습니까?",
"전산으로 상환하면 기록에 남으니 현금으로 상환해야한다는 내용을 들은 적이 있습니까?",
"카드 배송 또는 카드 발급 관련 전화를 받은 적이 있습니까?",
"본인이 신청하지 않은 카드가 발급되었다고 들었습니까?",
"명의도용 또는 범죄 연루를 언급했습니까?",
"금융감독원, 검찰, 경찰 등 공공기관을 사칭했습니까?",
"사건번호 또는 수사를 언급했습니까?",
"구속, 범죄 연루 등의 말을 했습니까?",
"다른 사람에게 알리지 말라고 했습니까?",
"특급사건, 극비수사, 보완수사, 약식수사에 대해 들은 적이 있습니까?",
"통화 내용을 비밀로 하라고 했습니까?",
"계속 통화를 유지하게 했습니까?",
"정시보고에 대해 들은 적이 있습니까?",
"행동을 보고하라고 했습니까?",
"휴대전화 점검을 이유로 앱 설치를 요구했습니까?",
"애니데스크, 팀뷰어 등 원격제어앱을 사용한 적이 있습니까?",
"원격제어 또는 화면 공유를 요구했습니까?",
"설치 후 휴대전화가 이상하게 작동했습니까?",
"텔레그램, 라인, 왓츠, 위챗, 시그널 등 대화어플을 설치한 적이 있습니까?",
"수사기관은 대화앱으로 수사하지 않는 사실을 알고 있습니까?",
"금융감독원(1332) 또는 검찰(1301)에 전화하라고 했습니까?",
"전화 후 즉시 연결된 느낌이었습니까?",
"공식기관처럼 응대했습니까?",
"극비 사건이라며 보안을 강조했습니까?",
"주변 사람을 믿지 말라고 했습니까?",
"감시당한다고 느꼈습니까?",
"현금 인출 또는 송금을 요구했습니까?",
"거짓말을 지시했습니까?",
"현금을 전달하라고 했습니까?",
"가족 또는 주변 사람에게 공유했습니까?"
];

let index=0;
let score=0;

function start(){
    document.getElementById("intro").style.display="none";
    document.getElementById("quiz").style.display="block";
    loadQuestion();
}

function loadQuestion(){
    document.getElementById("question").innerText=questions[index];
    document.getElementById("progress").innerText=(index+1)+"/"+questions.length;
}

function answer(v){
    if(v) score+=3;
    index++;

    if(index<questions.length){
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult(){
    document.getElementById("quiz").style.display="none";
    document.getElementById("resultBox").style.display="block";

    let text="";
    if(score>50){
        text="🔴 매우 높은 위험\n즉시 112 신고 및 금융거래 중단";
    } else if(score>25){
        text="🟠 의심 상황\n공식기관 확인 필요";
    } else {
        text="🟢 낮은 위험\n예방수칙 숙지";
    }

    document.getElementById("result").innerText="점수: "+score+"\n\n"+text;
}

function restart(){
    index=0; score=0;
    document.getElementById("resultBox").style.display="none";
    document.getElementById("intro").style.display="block";
}

</script>

</body>
</html>
