<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 정밀 진단</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial;
    background: #f1f4f8;
}

/* 상단 경찰서 헤더 */
.header {
    background: #003366;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}

/* 메인 박스 */
.container {
    max-width: 500px;
    margin: 20px auto;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    text-align: center;
}

h2 {
    margin-top: 0;
    font-size: 20px;
}

/* 진행상황 */
#progress {
    color: gray;
    margin-bottom: 10px;
}

/* 질문 */
#question {
    font-size: 18px;
    margin: 20px 0;
}

/* 버튼 */
button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.yes { background: #d9534f; color: white; }
.no { background: #0275d8; color: white; }

/* 결과 */
#result {
    margin-top: 20px;
    font-size: 16px;
    white-space: pre-line;
    text-align: left;
}

/* 하단 버튼 */
.action-btn {
    background: #333;
    color: white;
}

.alert {
    background: #fff3cd;
    padding: 10px;
    margin-top: 15px;
    border-radius: 6px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">
🚔 광주광산경찰서 보이스피싱 예방 시스템
</div>

<div class="container">
<div class="card">

<h2>보이스피싱 정밀 진단</h2>
<div id="progress"></div>
<div id="question"></div>

<button class="yes" onclick="answer(true)">예</button>
<button class="no" onclick="answer(false)">아니오</button>

<div id="result"></div>

<button id="restart" class="action-btn" style="display:none;" onclick="restart()">다시 시작</button>

<div class="alert">
⚠️ 의심 시 즉시 112 또는 금융감독원 1332로 확인하세요
</div>

</div>
</div>

<script>
const questions = [
{q:"카드 배송 또는 카드 발급 관련 전화를 받은 적이 있습니까?", w:2},
{q:"본인이 신청하지 않은 카드가 발급되었다고 들었습니까?", w:3},
{q:"명의도용 또는 범죄 연루를 언급했습니까?", w:4},

{q:"금융감독원, 검찰, 경찰 등 공공기관을 사칭했습니까?", w:4},
{q:"사건번호 또는 수사를 언급했습니까?", w:3},
{q:"구속, 범죄 연루 등의 말을 했습니까?", w:4},

{q:"다른 사람에게 알리지 말라고 했습니까?", w:5},
{q:"통화 내용을 비밀로 하라고 했습니까?", w:5},
{q:"계속 통화를 유지하게 했습니까?", w:4},
{q:"행동을 보고하라고 했습니까?", w:5},

{q:"휴대전화 점검을 이유로 앱 설치를 요구했습니까?", w:7},
{q:"원격제어 또는 화면 공유를 요구했습니까?", w:8},
{q:"설치 후 휴대전화가 이상하게 작동했습니까?", w:6},

{q:"금융감독원(1332) 또는 검찰(1301)에 전화하라고 했습니까?", w:5},
{q:"전화했을 때 이미 연결된 상태처럼 느껴졌습니까?", w:6},
{q:"공식기관처럼 응대했습니까?", w:5},

{q:"극비 사건이라며 보안을 강조했습니까?", w:5},
{q:"주변 사람을 믿지 말라고 했습니까?", w:5},
{q:"감시당하고 있다는 느낌을 받았습니까?", w:6},

{q:"현금 인출 또는 송금을 요구했습니까?", w:9},
{q:"경찰이나 은행 직원에게 거짓말하라고 했습니까?", w:9},

{q:"공식번호로 직접 확인한 적 있습니까?", w:-6},
{q:"가족 또는 주변 사람에게 공유했습니까?", w:-5}
];

let index = 0;
let score = 0;

function loadQuestion() {
    document.getElementById("question").innerText = questions[index].q;
    document.getElementById("progress").innerText =
        (index+1) + " / " + questions.length;
}

function answer(isYes) {
    if (isYes) score += questions[index].w;
    index++;

    if (index < questions.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    let text = "";

    if (score >= 40) {
        text = "🔴 매우 높은 위험\n\n"
        + "즉시 조치:\n"
        + "1. 휴대전화 전원 차단\n"
        + "2. 설치 앱 삭제\n"
        + "3. 112 신고\n"
        + "4. 금융기관 지급정지 요청\n"
        + "5. 휴대전화 초기화 권고";
    }
    else if (score >= 20) {
        text = "🟠 높은 의심\n\n"
        + "금융감독원(1332) 또는 검찰(1301)로 직접 확인\n"
        + "금융거래 즉시 중단";
    }
    else {
        text = "🟢 낮은 위험\n\n"
        + "예방수칙을 숙지하세요.";
    }

    document.getElementById("question").innerText = "진단 결과";
    document.getElementById("result").innerText =
        "총 점수: " + score + "\n\n" + text;

    document.getElementById("restart").style.display = "block";
}

function restart() {
    index = 0;
    score = 0;
    document.getElementById("result").innerText = "";
    document.getElementById("restart").style.display = "none";
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
