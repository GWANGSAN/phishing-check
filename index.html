<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 예방 진단 시스템</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", Arial;
    background:#eef2f6;
    font-size:20px;
}

.header{
    background:#002b5c;
    color:white;
    padding:22px;
    text-align:center;
    font-weight:900;
    font-size:26px;
}

.container{
    max-width:650px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:14px;
    padding:26px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
}

h2{ color:#002b5c; font-size:26px; }

button{
    width:100%;
    padding:18px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
}

.primary{background:#002b5c;color:white;}
.video{background:#c62828;color:white;}
.gray{background:#777;color:white;}
.green{background:#2e7d32;color:white;}

.caseBox{
    margin-top:15px;
    background:#fff7e6;
    border-left:6px solid #ff9800;
    padding:16px;
    border-radius:10px;
    font-size:18px;
}

.caseItem{
    background:#fff;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    font-size:18px;
    border:1px solid #eee;
}

.hidden{display:none;}

#question{
    font-size:26px;
    font-weight:900;
    margin:25px 0;
}

.choiceBtn{
    background:#1565c0;
    color:white;
    font-size:20px;
    padding:16px;
}

.descBox{
    margin-top:10px;
    padding:14px;
    background:#eef5ff;
    display:none;
    border-radius:8px;
    font-size:18px;
}

.progressBox{
    background:#ddd;
    border-radius:10px;
    margin-top:15px;
}

.progressBar{
    height:22px;
    width:0%;
    background:#c62828;
    transition:0.3s;
}

#preventionMsg{
    margin-top:14px;
    padding:14px;
    background:#eef6ff;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="header">🚔 광주광산경찰서 피싱범죄수사팀</div>

<div class="container">
<div class="card">

<!-- INTRO -->
<div id="intro">

<h2>📢 보이스피싱 진단</h2>

<p>보이스피싱 위험도를 분석하기 위한 진단프로그램입니다.
  영상 시청후 진단 시작을 시작해 주세요.</p>

<!-- ⚠️ 영상 코드는 절대 변경 금지 -->
<button class="video" id="videoBtn">▶ 영상 시청</button>

<div class="caseBox">
<div class="caseItem">검찰 사칭 - 1억 원 피해/자산검수</div>
<div class="caseItem">대출 사기 - 3,000만 원 피해/계약위반</div>
</div>

<button class="primary" id="startBtn">진단 시작</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>
<div id="descBox" class="descBox"></div>
<button id="nextBtn" class="primary hidden">다음</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">

<h2>결과</h2>

<div class="progressBox">
<div id="progressBar" class="progressBar"></div>
</div>

<div id="result"></div>
<div id="scoreText"></div>

<div id="preventionMsg"></div>

<button class="green" onclick="downloadTool()">
피해예방안내
</button>

<button class="gray" onclick="location.reload()">다시 시작</button>

</div>

</div>
</div>

<script>

/* =========================
   질문 (원본 유지 구조)
========================= */

const questions = [
{ q:"카드 배송 또는 카드 발급 관련 전화를 받은 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"카드 배송 사칭은 대표적인 보이스피싱 수법입니다. 본인이 신청하지 않았다면 100% 의심해야 합니다.", risk:1 }, { q:"본인이 신청하지 않은 카드가 발급되었다고 들었습니까?", choices:["예","아니오"], answer:1, desc:"명의도용을 빌미로 공포심을 유발하는 수법입니다. 실제 카드사는 이런 방식으로 연락하지 않습니다.", risk:2 }, { q:"명의도용 또는 범죄 연루를 언급했습니까?", choices:["예","아니오"], answer:1, desc:"검찰·경찰 사칭의 핵심 패턴입니다. 공포를 이용해 통제하려는 수법입니다.", risk:3 }, { q:"금융감독원, 검찰, 경찰 등 공공기관을 사칭했습니까?", choices:["예","아니오"], answer:1, desc:"공공기관 사칭은 보이스피싱의 가장 대표적인 특징입니다.", risk:3 }, { q:"사건번호 또는 수사를 언급했습니까?", choices:["예","아니오"], answer:1, desc:"실제 수사는 전화로 통보하지 않으며 사건번호를 먼저 알려주지 않습니다.", risk:2 }, { q:"구속, 범죄 연루 등의 말을 했습니까?", choices:["예","아니오"], answer:1, desc:"공포를 조성해 판단력을 흐리게 만드는 전형적인 수법입니다.", risk:3 }, { q:"다른 사람에게 알리지 말라고 했습니까?", choices:["예","아니오"], answer:1, desc:"외부 도움을 차단하는 것은 100% 사기 패턴입니다.", risk:3 }, { q:"특급사건, 극비수사, 보완수사, 약식수사에 대해 들은 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"'극비'라는 단어는 피해자를 고립시키기 위한 장치입니다.", risk:2 }, { q:"통화 내용을 비밀로 하라고 했습니까?", choices:["예","아니오"], answer:1, desc:"정상적인 기관은 절대 비밀을 요구하지 않습니다.", risk:3 }, { q:"계속 통화를 유지하게 했습니까?", choices:["예","아니오"], answer:1, desc:"판단 시간을 주지 않기 위한 통제 전략입니다.", risk:2 }, { q:"매시간마다 행동을 보고하는 -정시보고- 지시를 받았습니까?", choices:["예","아니오"], answer:1, desc:"완전히 통제된 상태로 만들기 위한 고위험 신호입니다.", risk:3 }, { q:"행동을 보고하라고 했습니까?", choices:["예","아니오"], answer:1, desc:"피해자를 통제하는 단계로 이미 위험 수준이 높습니다.", risk:2 }, { q:"휴대전화 점검을 이유로 앱 설치를 요구했습니까?", choices:["예","아니오"], answer:1, desc:"악성앱 설치 유도는 핵심 범죄 단계입니다.", risk:5 }, { q:"애니데스크, 팀뷰어 등 원격제어앱을 사용한 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"원격제어는 계좌 탈취로 직결되는 매우 위험한 단계입니다.", risk:5 }, { q:"원격제어 또는 화면 공유를 요구했습니까?", choices:["예","아니오"], answer:1, desc:"금융정보 탈취 목적입니다. 즉시 중단해야 합니다.", risk:5 }, { q:"설치 후 휴대전화가 이상하게 작동했습니까?", choices:["예","아니오"], answer:1, desc:"이미 악성앱 감염 가능성이 매우 높습니다.", risk:5 }, { q:"텔레그램, 라인 등 대화어플을 설치한 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"수사기관은 메신저로 지시하지 않습니다.", risk:3 }, { q:"수사기관은 대화어플로 수사지시를 하지 않는 사실을 알고 있습니까?", choices:["알고 있다","모른다"], answer:0, desc:"모른다면 사기 가능성에 쉽게 노출됩니다.", risk:2 }, { q:"금융감독원(1332) 또는 검찰(1301)에 전화하라고 했습니까?", choices:["예","아니오"], answer:1, desc:"전화 가로채기 수법으로 연결됩니다.", risk:4 }, { q:"고객센터 전화 후 즉시 상담사가 연결되었습니까?", choices:["예","아니오"], answer:1, desc:"정상 기관은 대기 없이 바로 연결되지 않습니다.", risk:3 }, { q:"고객센터는 상담사가 즉시 연결되지 않는 사실을 알고 있습니까?", choices:["알고 있다","모른다"], answer:0, desc:"이걸 모르면 사기 전화에 속기 쉽습니다.", risk:2 }, { q:"공식기관처럼 응대했습니까?", choices:["예","아니오"], answer:1, desc:"사기범은 실제 기관처럼 연기합니다.", risk:2 }, { q:"극비 사건이라며 보안을 강조했습니까?", choices:["예","아니오"], answer:1, desc:"고립 유도 → 사기 핵심 패턴입니다.", risk:3 }, { q:"주변 사람을 믿지 말라고 했습니까?", choices:["예","아니오"], answer:1, desc:"완전한 통제 단계입니다.", risk:4 }, { q:"감시당한다고 느꼈습니까?", choices:["예","아니오"], answer:1, desc:"심리적 압박 상태 → 매우 위험", risk:4 }, { q:"현금 인출 또는 송금을 요구했습니까?", choices:["예","아니오"], answer:1, desc:"금전 요구 = 100% 사기", risk:5 }, { q:"출금 목적에 대해 거짓말을 지시했습니까?", choices:["예","아니오"], answer:1, desc:"범죄 가담 단계입니다.", risk:5 }, { q:"현금을 전달하라고 했습니까?", choices:["예","아니오"], answer:1, desc:"직접 전달은 고위험 범죄입니다.", risk:5 }, { q:"가족 또는 주변 사람에게 공유했습니까?", choices:["공유했다","공유하지 않았다"], answer:0, desc:"공유하지 않았다면 이미 통제 상태입니다.", risk:3 }, { q:"명의도용 사건의 경우 피해자임을 알고 있습니까?", choices:["알고 있다","모른다"], answer:0, desc:"피해자를 피의자로 속이는 수법입니다.", risk:2 }, { q:"저금리 대환대출 전화를 받은 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"대출 사칭도 매우 흔한 수법입니다.", risk:2 }, { q:"대출약정위반, 보증금 관련 내용을 들었습니까?", choices:["예","아니오"], answer:1, desc:"가짜 금융용어로 속이는 수법입니다.", risk:3 }, { q:"기존 대출 상환 요구를 받았습니까?", choices:["예","아니오"], answer:1, desc:"대출 사기의 핵심 패턴입니다.", risk:4 }, { q:"현금 상환을 요구했습니까?", choices:["예","아니오"], answer:1, desc:"현금 요구 = 100% 사기입니다.", risk:5 } ];

let index = 0;
let score = 0;

const intro = document.getElementById("intro");
const quiz = document.getElementById("quiz");
const nextBtn = document.getElementById("nextBtn");

/* =========================
   시작
========================= */
document.getElementById("startBtn").onclick = () => {
    intro.classList.add("hidden");
    quiz.classList.remove("hidden");
    index = 0;
    score = 0;
    loadQ();
};

/* =========================
   질문 로딩 (안정화 패치)
========================= */
function loadQ(){

    const q = questions[index];

    if(!q){
        result();
        return;
    }

    document.getElementById("question").innerText = q.q;

    const c = document.getElementById("choices");
    c.innerHTML = "";

    q.choices.forEach((t,i)=>{
        let b = document.createElement("button");
        b.className = "choiceBtn";
        b.innerText = t;

        b.onclick = () => answer(i);

        c.appendChild(b);
    });

    document.getElementById("descBox").style.display = "none";
    nextBtn.classList.add("hidden");
}

/* =========================
   답변 처리 (오류 방지)
========================= */
function answer(i){

    const q = questions[index];

    if(i !== q.answer){
        score += q.risk;
    }

    document.getElementById("descBox").innerText = q.desc;
    document.getElementById("descBox").style.display = "block";

    nextBtn.classList.remove("hidden");
}

/* =========================
   다음 질문 (안정 패치)
========================= */
nextBtn.onclick = () => {
    index++;

    if(index >= questions.length){
        result();
    } else {
        loadQ();
    }
};

/* =========================
   결과
========================= */
function result(){

    quiz.classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    let max = questions.reduce((a,b)=>a+b.risk,0);
    let percent = (score / max) * 100;

    document.getElementById("progressBar").style.width = percent + "%";

    let msg =
        percent >= 70 ? "🚨 매우 위험"
        : percent >= 40 ? "⚠️ 주의"
        : "✅ 안전";

    document.getElementById("result").innerText = msg;
    document.getElementById("scoreText").innerText =
        "위험도: " + percent.toFixed(1) + "%";

    document.getElementById("preventionMsg").innerHTML =
        percent >= 70
        ? "🚨 당신은 보이스피싱 피해자입니다."
        : percent >= 40
        ? "⚠️ 가족 또는 금융기관 확인 필요"
        : "✅ 현재는 안전하지만 지속적 주의 필요";
}

/* =========================
   영상 (절대 변경 금지)
========================= */
document.getElementById("videoBtn").onclick = function(){
    window.open("YOUR_EXISTING_VIDEO_URL", "_blank");
};

/* =========================
   다운로드 기능 (추가만)
========================= */
function downloadTool(){

    const url = "bit.ly/polm";

    const a = document.createElement("a");
    a.href = url;
    a.download = "악성어플추출프로그램.apk";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

</script>

</body>
</html>
