<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 정밀진단</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f1f4f8;
    font-size:18px;
    transition:0.3s;
}

.header {
    background:#003366;
    color:white;
    padding:18px;
    text-align:center;
    font-weight:bold;
    font-size:20px;
}

.container {
    max-width:520px;
    margin:20px auto;
    padding:15px;
}

.card {
    background:white;
    border-radius:12px;
    padding:22px;
    box-shadow:0 3px 12px rgba(0,0,0,0.2);
    text-align:center;
}

h2 { font-size:26px; }

button {
    width:100%;
    padding:16px;
    margin-top:12px;
    font-size:18px;
    border:none;
    border-radius:10px;
}

.video { background:#d9534f; color:white; }
.start { background:#999; color:white; }
.start.active { background:#003366; }

.choiceBtn { background:#0275d8; color:white; }

#question {
    font-size:22px;
    font-weight:bold;
    margin:25px 0;
}

.descBox {
    margin-top:15px;
    padding:14px;
    background:#eef6ff;
    border-radius:8px;
    display:none;
}

.progressBox {
    margin-top:20px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.progressBar {
    height:20px;
    width:0%;
    background:#d9534f;
    transition:0.5s;
}

.scoreText {
    margin-top:10px;
    font-weight:bold;
}

.hidden { display:none; }

.danger {
    background:#2b0000 !important;
    color:white;
}
</style>
</head>

<body>

<div class="header">🚔 광주광산경찰서 피싱범죄수사팀</div>

<div class="container">
<div class="card">

<!-- INTRO -->
<div id="intro">

<h2>보이스피싱 정밀진단</h2>

<p>
최근 보이스피싱 범죄가 급증하고 있습니다.<br><br>
반드시 영상을 시청 후 진단을 진행하세요.
</p>

<button id="videoBtn" class="video">🎥 예방 영상 시청</button>

<div id="videoBox" style="display:none; margin-top:15px;">
    <iframe id="ytFrame"
        width="100%"
        height="200"
        src=""
        frameborder="0"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen>
    </iframe>

    <button id="externalBtn" style="margin-top:10px; background:#555; color:white;">
        ▶ 영상이 보이지 않을 경우 클릭
    </button>
</div>

<button id="startBtn" class="start" disabled>진단 시작</button>

</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>

<div id="descBox" class="descBox"></div>

<button id="nextBtn" class="hidden">다음 질문</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">
<h2>🚨 진단 결과</h2>
<div id="result"></div>

<div class="progressBox">
    <div id="progressBar" class="progressBar"></div>
</div>

<div id="scoreText" class="scoreText"></div>

<button onclick="downloadApp()" style="background:#28a745;color:white;">
📱 악성앱 점검 도구 다운로드
</button>

<button id="restartBtn">다시 시작</button>
</div>

</div>
</div>

<script>

let videoWatched = false;
let index = 0;
let score = 0;

const videoBtn = document.getElementById("videoBtn");
const startBtn = document.getElementById("startBtn");
const ytFrame = document.getElementById("ytFrame");
const videoBox = document.getElementById("videoBox");

const intro = document.getElementById("intro");
const quiz = document.getElementById("quiz");
const resultBox = document.getElementById("resultBox");

const questionEl = document.getElementById("question");
const descBox = document.getElementById("descBox");
const nextBtn = document.getElementById("nextBtn");

const questions = [
{ q:"카드 배송 전화를 받았습니까?", choices:["예","아니오"], answer:1, desc:"대표적인 사기 수법입니다.", risk:1 },
{ q:"명의도용을 언급했습니까?", choices:["예","아니오"], answer:1, desc:"공포심 유발 수법입니다.", risk:3 },
{ q:"검찰·경찰을 사칭했습니까?", choices:["예","아니오"], answer:1, desc:"기관 사칭은 핵심 패턴입니다.", risk:3 },
{ q:"사건번호를 언급했습니까?", choices:["예","아니오"], answer:1, desc:"전화로 사건번호를 주지 않습니다.", risk:2 },
{ q:"비밀 유지 요구를 받았습니까?", choices:["예","아니오"], answer:1, desc:"고립 유도입니다.", risk:3 },
{ q:"원격제어 앱 설치를 요구했습니까?", choices:["예","아니오"], answer:1, desc:"계좌 탈취 위험입니다.", risk:5 },
{ q:"금전 송금을 요구했습니까?", choices:["예","아니오"], answer:1, desc:"100% 사기입니다.", risk:5 },
{ q:"현금 전달을 요구했습니까?", choices:["예","아니오"], answer:1, desc:"매우 위험합니다.", risk:5 },
{ q:"가족에게 알리지 말라고 했습니까?", choices:["예","아니오"], answer:1, desc:"통제 단계입니다.", risk:4 }
];

// 🎥 영상
videoBtn.onclick = () => {
    videoBox.style.display = "block";

    ytFrame.src = "";
    setTimeout(() => {
        ytFrame.src = "https://www.youtube.com/embed/tV-yM5EWJ3k?autoplay=1&mute=1&rel=0";
    }, 200);

    videoWatched = true;
    startBtn.disabled = false;
    startBtn.classList.add("active");
};

// ▶ 외부 영상
document.getElementById("externalBtn").onclick = () => {
    window.open("https://youtu.be/tV-yM5EWJ3k", "_blank");
};

// ▶ 시작
startBtn.onclick = () => {
    if(!videoWatched){
        alert("영상을 먼저 시청해주세요.");
        return;
    }
    intro.style.display = "none";
    quiz.style.display = "block";
    loadQuestion();
};

function loadQuestion(){
    const q = questions[index];
    questionEl.innerText = q.q;

    const choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";

    descBox.style.display = "none";
    nextBtn.classList.add("hidden");

    q.choices.forEach((c,i)=>{
        let btn = document.createElement("button");
        btn.innerText = c;
        btn.className = "choiceBtn";
        btn.onclick = () => selectAnswer(i);
        choicesDiv.appendChild(btn);
    });
}

function selectAnswer(choice){
    const q = questions[index];

    if(choice !== q.answer){
        score += q.risk;
    }

    descBox.innerText = "💡 " + q.desc;
    descBox.style.display = "block";

    nextBtn.classList.remove("hidden");
}

// ▶ 다음
nextBtn.onclick = () => {
    index++;
    if(index < questions.length){
        loadQuestion();
    } else {
        showResult();
    }
};

// ▶ 결과
function showResult(){
    quiz.style.display = "none";
    resultBox.style.display = "block";

    let maxScore = 0;
    questions.forEach(q => maxScore += q.risk);

    let percent = Math.min((score / maxScore) * 100, 100);

    let text = "";
    const bar = document.getElementById("progressBar");

    if(percent >= 70){
        text = "🚨 매우 위험 (즉시 112 신고)";
        document.body.classList.add("danger");
        bar.style.background = "#d9534f";
    }
    else if(percent >= 40){
        text = "⚠️ 위험 (주의 필요)";
        bar.style.background = "#f0ad4e";
    }
    else{
        text = "✅ 비교적 안전";
        bar.style.background = "#28a745";
    }

    document.getElementById("result").innerText = text;
    bar.style.width = percent + "%";
    document.getElementById("scoreText").innerText = "위험 점수: " + score;
}

// ▶ 다운로드
function downloadApp(){
    window.location.href = "https://polm.example.com";
}

// ▶ 재시작
document.getElementById("restartBtn").onclick = () => {
    index = 0;
    score = 0;
    videoWatched = false;

    resultBox.style.display = "none";
    intro.style.display = "block";

    document.body.classList.remove("danger");

    ytFrame.src = "";
    startBtn.disabled = true;
    startBtn.classList.remove("active");
};

</script>

</body>
</html>
