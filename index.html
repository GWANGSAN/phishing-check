<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 예방 진단 시스템</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", Arial;
    background:#eef2f6;
    font-size:20px; /* 👈 노인용 확대 */
}

.header{
    background:#002b5c;
    color:white;
    padding:22px;
    text-align:center;
    font-weight:900;
    font-size:26px; /* 👈 확대 */
}

.container{
    max-width:650px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:14px;
    padding:26px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
}

h2{ color:#002b5c; font-size:26px; }

button{
    width:100%;
    padding:18px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-size:20px; /* 👈 확대 */
    cursor:pointer;
}

.primary{background:#002b5c;color:white;}
.video{background:#c62828;color:white;}
.gray{background:#777;color:white;}
.green{background:#2e7d32;color:white;}

.caseBox{
    margin-top:15px;
    background:#fff7e6;
    border-left:6px solid #ff9800;
    padding:16px;
    border-radius:10px;
    font-size:18px;
}

.caseTitle{
    font-weight:900;
    color:#d35400;
    margin-bottom:10px;
    font-size:20px;
}

.caseItem{
    background:#fff;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    font-size:18px;
    border:1px solid #eee;
}

.hidden{display:none;}

#question{
    font-size:26px;
    font-weight:900;
    margin:25px 0;
}

.choiceBtn{
    background:#1565c0;
    color:white;
    font-size:20px;
    padding:16px;
}

.descBox{
    margin-top:10px;
    padding:14px;
    background:#eef5ff;
    display:none;
    border-radius:8px;
    font-size:18px;
}

.progressBox{
    background:#ddd;
    border-radius:10px;
    margin-top:15px;
}

.progressBar{
    height:22px;
    width:0%;
    background:#c62828;
    transition:0.3s;
}

.danger{background:#2b0000 !important;color:white;}

#preventionMsg{
    margin-top:14px;
    padding:14px;
    background:#eef6ff;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="header">🚔 광주광산경찰서 피싱범죄수사팀</div>

<div class="container">
<div class="card">

<!-- INTRO -->
<div id="intro">

<h2>📢 보이스피싱 진단 안내</h2>

<p style="font-size:20px;">
이 프로그램은 보이스피싱 위험도를 간단히 진단합니다.<br>
영상을 시청후 진단을 진행해 주세요.
</p>

<button class="video" id="videoBtn">▶ 영상 시청</button>

<div class="caseBox">
<div class="caseTitle">🚨 실제 피해 사례</div>

<div class="caseItem">
<b>검찰 사칭</b><br>
2026. 4. 2. 1억 원 피해/현금 전달 요구/자산검수
</div>

<div class="caseItem">
<b>대출 사기</b><br>
2026. 4. 1. 3,000만 원 피해/계좌이체 유도/약정위반
</div>
</div>

<button class="primary" id="startBtn">진단 시작</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>
<div id="descBox" class="descBox"></div>
<button id="nextBtn" class="primary hidden">다음</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">

<h2>결과</h2>

<div class="progressBox">
<div id="progressBar" class="progressBar"></div>
</div>

<div id="result"></div>
<div id="scoreText"></div>

<div id="preventionMsg"></div>

<button class="green">피해예방 안내</button>
<button class="gray" onclick="location.reload()">다시 시작</button>

</div>

</div>
</div>

<script>

/* =========================
   질문 (수정/추가/삭제 가능 구조)
========================= */

const questions = [
{
 q:"카드 배송 또는 카드 발급 관련 전화를 받은 적이 있습니까?",
 choices:["예","아니오"],
 answer:1,
 risk:1,
 desc:"카드 사칭은 대표적인 보이스피싱입니다."
},
{
 q:"본인이 신청하지 않은 카드가 발급되었다고 들었습니까?",
 choices:["예","아니오"],
 answer:1,
 risk:2,
 desc:"명의도용 사기입니다."
},
{
 q:"금융기관 또는 검찰을 사칭한 전화를 받았습니까?",
 choices:["예","아니오"],
 answer:1,
 risk:3,
 desc:"기관 사칭 수법입니다."
},
{
 q:"현금 전달 또는 계좌이체 요구를 받았습니까?",
 choices:["예","아니오"],
 answer:1,
 risk:5,
 desc:"즉시 사기 의심 상황입니다."
}
];

let index = 0;
let score = 0;

const intro = document.getElementById("intro");
const quiz = document.getElementById("quiz");
const nextBtn = document.getElementById("nextBtn");

document.getElementById("startBtn").onclick = () => {
    intro.classList.add("hidden");
    quiz.classList.remove("hidden");
    index = 0;
    score = 0;
    loadQ();
};

function loadQ() {
    const q = questions[index];

    document.getElementById("question").innerText = q.q;

    const c = document.getElementById("choices");
    c.innerHTML = "";

    q.choices.forEach((t, i) => {
        let b = document.createElement("button");
        b.className = "choiceBtn";
        b.innerText = t;
        b.onclick = () => answer(i);
        c.appendChild(b);
    });

    document.getElementById("descBox").style.display = "none";
    nextBtn.classList.add("hidden");
}

function answer(i) {
    const q = questions[index];

    if (i !== q.answer) score += q.risk;

    let d = document.getElementById("descBox");
    d.innerText = q.desc;
    d.style.display = "block";

    nextBtn.classList.remove("hidden");
}

nextBtn.onclick = () => {
    index++;
    if (index < questions.length) {
        loadQ();
    } else {
        result();
    }
};

function result() {

    quiz.classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    let max = questions.reduce((a, b) => a + b.risk, 0);
    let percent = (score / max) * 100;

    document.getElementById("progressBar").style.width = percent + "%";

    let msg = "";

    if (percent >= 70) msg = "🚨 매우 위험";
    else if (percent >= 40) msg = "⚠️ 주의";
    else msg = "✅ 안전";

    document.getElementById("result").innerText = msg;
    document.getElementById("scoreText").innerText = "위험도: " + percent.toFixed(1) + "%";

    /* 🚨 마지막 경고 문구 */
    let p = "";

    if (percent >= 70) {
        p = "🚨 즉시 신고 필요 (112 / 182)<br>금융기관은 절대 돈 요구 안함<br><b>즉시 통화 종료하세요</b>";
    } else if (percent >= 40) {
        p = "⚠️ 의심 상황입니다<br>가족 또는 기관 직접 확인 필요";
    } else {
        p = "✅ 안전 수준입니다<br>하지만 보이스피싱은 계속 증가 중입니다";
    }

    document.getElementById("preventionMsg").innerHTML = p;
}

</script>

</body>
</html>
