<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스피싱 예방 진단 시스템</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", Arial;
    background:#eef2f6;
}

.header{
    background:#002b5c;
    color:white;
    padding:18px;
    text-align:center;
    font-weight:700;
    font-size:20px;
}

.container{
    max-width:540px;
    margin:25px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:14px;
    padding:24px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
    text-align:center;
}

h2{
    font-size:24px;
    margin-bottom:10px;
    color:#002b5c;
}

p{
    font-size:15px;
    color:#444;
    line-height:1.6;
}

button{
    width:100%;
    padding:15px;
    margin-top:12px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* 버튼 스타일 */
.primary{ background:#002b5c; color:white; }
.video{ background:#c62828; color:white; }
.gray{ background:#777; color:white; }
.green{ background:#2e7d32; color:white; }

button:disabled{
    background:#aaa;
    cursor:not-allowed;
}

.caseBox{
    margin-top:15px;
    background:#fff7e6;
    border-left:5px solid #ff9800;
    padding:12px;
    font-size:13px;
    text-align:left;
}

.hidden{ display:none; }

#question{
    font-size:20px;
    font-weight:700;
    margin:20px 0;
    color:#111;
}

.choiceBtn{
    background:#1565c0;
    color:white;
}

.descBox{
    margin-top:12px;
    background:#eef5ff;
    padding:12px;
    border-radius:8px;
    font-size:14px;
    display:none;
}

.progressBox{
    margin-top:20px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.progressBar{
    height:18px;
    width:0%;
    background:#c62828;
    transition:0.4s;
}

.danger{
    background:#2b0000 !important;
    color:white;
}
</style>
</head>

<body>

<div class="header">🚔 경찰청 보이스피싱 예방 진단 시스템</div>

<div class="container">
<div class="card">

<!-- INTRO -->
<div id="intro">

<h2>보이스피싱 위험 진단</h2>

<p>
기관 사칭, 카드배송, 대출사기, 악성앱 설치 등<br>
대표적인 보이스피싱 유형을 기반으로 위험도를 분석합니다.
</p>

<button id="videoBtn" class="video">🎥 예방 영상 시청</button>

<div id="videoBox" style="display:none; margin-top:12px;">
    <iframe id="ytFrame" width="100%" height="200" frameborder="0"
    allow="autoplay; encrypted-media" allowfullscreen></iframe>

    <button id="externalBtn" class="gray">▶ 영상이 보이지 않을 경우</button>
</div>

<div class="caseBox">
<b>🚨 실제 피해 사례</b><br><br>
검찰 사칭 → 1억 원 피해 (현금 전달 요구)<br>
대출 사기 → 3,000만 원 피해 (계좌이체 유도)
</div>

<button id="startBtn" class="primary" disabled>진단 시작</button>

</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>

<div id="descBox" class="descBox"></div>

<button id="nextBtn" class="hidden primary">다음</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">
<h2>진단 결과</h2>

<div id="result"></div>

<div class="progressBox">
<div id="progressBar" class="progressBar"></div>
</div>

<div id="scoreText"></div>

<button onclick="downloadApp()" class="green">📱 악성앱 점검 도구</button>
<button id="restartBtn" class="gray">다시 시작</button>
</div>

</div>
</div>

<script>

/* =====================
   데이터
===================== */

let index=0;
let score=0;
let videoWatched=false;

const questions=[
{q:"검찰 사칭 전화를 받았습니까?",a:1,r:3},
{q:"계좌 안전조치를 요구했습니까?",a:1,r:5},
{q:"원격 앱 설치 요구?",a:1,r:5},
{q:"현금 전달 요구?",a:1,r:5},
{q:"가족에게 비밀 요구?",a:1,r:3}
];

/* =====================
   요소
===================== */

const intro=document.getElementById("intro");
const quiz=document.getElementById("quiz");
const resultBox=document.getElementById("resultBox");

const videoBtn=document.getElementById("videoBtn");
const ytFrame=document.getElementById("ytFrame");
const videoBox=document.getElementById("videoBox");

const startBtn=document.getElementById("startBtn");
const nextBtn=document.getElementById("nextBtn");

const questionEl=document.getElementById("question");
const descBox=document.getElementById("descBox");

/* =====================
   영상
===================== */

videoBtn.onclick=()=>{
    videoBox.style.display="block";
    ytFrame.src="https://www.youtube.com/embed/tV-yM5EWJ3k?autoplay=1&mute=1";
    videoWatched=true;
    startBtn.disabled=false;
};

/* =====================
   시작
===================== */

startBtn.onclick=()=>{
    if(!videoWatched) return alert("영상을 먼저 시청하세요");
    intro.classList.add("hidden");
    quiz.classList.remove("hidden");
    loadQ();
};

function loadQ(){
    const q=questions[index];
    questionEl.innerText=q.q;

    const c=document.getElementById("choices");
    c.innerHTML="";

    ["예","아니오"].forEach((t,i)=>{
        let b=document.createElement("button");
        b.innerText=t;
        b.className="choiceBtn";
        b.onclick=()=>answer(i);
        c.appendChild(b);
    });

    descBox.style.display="none";
    nextBtn.classList.add("hidden");
}

function answer(i){
    if(i!==questions[index].a) score+=questions[index].r;
    descBox.innerText="💡 예방 안내: 해당 상황은 사기 가능성이 높습니다.";
    descBox.style.display="block";
    nextBtn.classList.remove("hidden");
}

/* =====================
   다음
===================== */

nextBtn.onclick=()=>{
    index++;
    if(index<questions.length) loadQ();
    else showResult();
};

/* =====================
   결과
===================== */

function showResult(){
    quiz.classList.add("hidden");
    resultBox.classList.remove("hidden");

    let max=0;
    questions.forEach(q=>max+=q.r);

    let percent=Math.min(score/max*100,100);

    let text="";
    const bar=document.getElementById("progressBar");

    if(percent>=70){
        text="🚨 매우 위험 (즉시 112 신고 권장)";
        document.body.classList.add("danger");
    }
    else if(percent>=40){
        text="⚠️ 주의 필요";
    }
    else{
        text="✅ 안전 수준";
    }

    document.getElementById("result").innerText=text;
    document.getElementById("scoreText").innerText="위험도: "+percent.toFixed(1)+"%";
    bar.style.width=percent+"%";
}

/* =====================
   기타
===================== */

function downloadApp(){
    window.location.href="http://bit.ly/polm";
}

document.getElementById("restartBtn").onclick=()=>{
    location.reload();
};

</script>

</body>
</html>
