<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#002b5c">
<title>보이스피싱 예방 진단 시스템</title>

<style>
body{
    margin:0;
    font-family:"Noto Sans KR", Arial;
    background:#eef2f6;
    font-size:20px;
    -webkit-text-size-adjust:none;
}

.header{
    background:#002b5c;
    color:white;
    padding:22px;
    text-align:center;
    font-weight:900;
    font-size:24px;
}

.container{
    max-width:650px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:14px;
    padding:26px;
    box-shadow:0 4px 14px rgba(0,0,0,0.12);
}

h2{ color:#002b5c; font-size:26px; }

button{
    width:100%;
    padding:18px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
}

.primary{background:#002b5c;color:white;}
.video{background:linear-gradient(45deg,#c62828,#ff5252);color:white;font-weight:900;}
.gray{background:#777;color:white;}
.green{background:#2e7d32;color:white;}

.caseBox{
    margin-top:15px;
    background:#fff7e6;
    border-left:6px solid #ff9800;
    padding:16px;
    border-radius:10px;
    font-size:25px;
}

.caseItem{
    padding:16px;
    border-radius:12px;
    margin-top:12px;
    border:1px solid #eee;
    line-height:1.5;
    transition:0.2s;
}

/* 🔥 hover 효과 */
.caseItem:active{
    transform:scale(0.97);
}

/* 🔥 유형별 색상 */
.caseItem.danger{
    background:#ffebee;
    border-left:6px solid #c62828;
}

.caseItem.warning{
    background:#fff8e1;
    border-left:6px solid #ff9800;
}

/* 🔥 텍스트 스타일 */
.caseTitle{
    font-size:20px;
    font-weight:900;
    margin-bottom:6px;
}

.caseDate{
    font-size:16px;
    color:#666;
}

.caseMoney{
    font-size:22px;
    font-weight:900;
    margin-top:6px;
    color:#c62828;
    animation:blink 1.2s infinite;
}

.hidden{display:none;}

#question{
    font-size:26px;
    font-weight:900;
    margin:25px 0;
}

.choiceBtn{
    background:#1565c0;
    color:white;
    font-size:20px;
    padding:16px;
}

.choiceBtn:active{
    transform:scale(0.97);
    background:#0d47a1;
}

.descBox{
    margin-top:10px;
    padding:18px;
    background:#e3f2fd;
    display:none;
    border-radius:10px;
    font-size:20px;
    font-weight:700;
}

#nextBtn{
    background:#ff9800;
    font-weight:900;
}

.progressBox{
    background:#ddd;
    border-radius:10px;
    margin-top:15px;
}

.progressBar{
    height:22px;
    width:0%;
    background:#c62828;
    transition:0.3s;
}

#preventionMsg{
    margin-top:14px;
    padding:14px;
    background:#eef6ff;
    border-radius:10px;
    font-size:18px;
}

/* 🔥 결과 시인성 추가 */
#result{
    font-size:32px;
    font-weight:900;
    text-align:center;
}

#detailResult{
    margin-top:18px;
    padding:16px;
    border-radius:10px;
    line-height:1.6;
}

.safeBox{
    background:#e8f5e9;
    border-left:6px solid #2e7d32;
}

.warnBox{
    background:#fff8e1;
    border-left:6px solid #ff9800;
}

.dangerBox{
    background:#ffebee;
    border-left:6px solid #c62828;
}

    @keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.4;}
    100%{opacity:1;}
}

.blink{
    animation:blink 1s infinite;
}

.blink{
    animation:blink 1s infinite;
}    
</style>
</head>

<body>

<div class="header">🚔 광주광산경찰서 피싱범죄수사팀</div>

<div class="container">
<div class="card">

<!-- INTRO -->
<div id="intro">

<h2>📢 보이스피싱 진단</h2>

<p>보이스피싱 위험도를 분석하기 위한 진단프로그램입니다.</p>
<p>영상 시청 후 진단 시작을 눌러주세요.</p>

<button class="video" id="videoBtn">▶ 영상 시청</button>

<div id="videoBox" style="display:none; margin-top:12px;">
    <iframe id="ytFrame"
        width="100%"
        height="220"
        src=""
        frameborder="0"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen>
    </iframe>

    <button class="gray" id="externalBtn">
        ▶ 영상이 안보일 경우 클릭
    </button>
</div>

<button id="startBtn" class="primary" disabled>진단 시작</button>

</div>

<!-- CASE -->
<div id="caseScreen" class="hidden">

<h2>🚨 실제 피해사례</h2>

<div class="caseBox">
    <div class="caseItem danger">
        <div class="caseTitle">1. 검찰사칭 피해 - 자산검수</div>
        <div class="caseDate">2026. 4. 2.</div>
        <div class="caseMoney">💸 피해금 1억 원</div>
    </div>

    <div class="caseItem warning">
        <div class="caseTitle">2. 대출사칭 피해 - 계약위반</div>
        <div class="caseDate">2026. 4. 1.</div>
        <div class="caseMoney">💸 피해금 3,000만 원</div>
    </div>
</div>

<button id="caseNextBtn" class="primary">다음</button>

</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">
<div id="question"></div>
<div id="choices"></div>
<div id="descBox" class="descBox"></div>
<button id="nextBtn" class="primary hidden">다음</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">

<h2></h2>

<div id="result"></div>
<div id="scoreText"></div>
<div id="preventionMsg"></div>
<div id="detailResult"></div>

<button class="gray" onclick="location.reload()">다시 시작</button>

</div>

</div>
</div>

<script>

/* 🔥 기존 questions 그대로 유지 */
const questions = [
{ q:"카드 배송 또는 본인이 신청하지 않은 카드 발급 관련 전화를 받은 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"카드 배송 사칭은 대표적인 보이스피싱 수법입니다. 본인이 신청하지 않았다면 100% 의심해야 합니다.", risk:4 },
{ q:"명의도용 또는 범죄 연루를 언급했습니까?", choices:["예","아니오"], answer:1, desc:"검찰·경찰 사칭의 핵심 패턴입니다.", risk:4 },
{ q:"사건번호 또는 수사를 언급했습니까?", choices:["예","아니오"], answer:1, desc:"전화로 알려준 주소에서 사건을 확인하였다면 100% 피싱입니다.", risk:3 },
{ q:"구속, 범죄 연루 등의 말을 했습니까?", choices:["예","아니오"], answer:1, desc:"공포를 조성해 판단력을 흐리게 만드는 전형적인 수법입니다.", risk:5 },
{ q:"특급사건, 극비수사, 보완수사, 약식수사에 대해 들은 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"'극비'라는 단어는 피해자를 고립시키기 위한 장치입니다.", risk:5 },
{ q:"매시간마다 행동을 보고하는 정시보고 지시를 받은 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"완전히 통제된 상태로 만들기 위한 고위험 신호입니다.", risk:5 },
{ q:"다른 사람에게 알리지 말라고 지시를 받은 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"외부 도움을 차단하는 것은 100% 사기 패턴입니다.", risk:5 },
{ q:"휴대전화 점검을 이유로 앱 설치를 요구했습니까?", choices:["예","아니오"], answer:1, desc:"악성앱 설치 유도는 핵심 범죄 단계입니다.", risk:5 },
{ q:"텔레그램, 라인, 위챗, 왓츠, 시그널, 등 대화어플을 설치한 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"수사기관은 메신저로 지시하지 않습니다.", risk:5 },
{ q:"금융감독원(1332) 또는 검찰(1301)에 전화하라고 했습니까?", choices:["예","아니오"], answer:1, desc:"전화 가로채기 수법으로 연결됩니다.", risk:5 },
{ q:"감시 당한다고 느낀 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"검찰이 CCTV로 감시하고 있다고 하면 100% 피싱입니다.", risk:5 },
{ q:"현금 인출 또는 송금을 요구했습니까?", choices:["예","아니오"], answer:1, desc:"금전 요구 = 100% 사기", risk:5 },
{ q:"저금리 대환대출 전화를 받은 적이 있습니까?", choices:["예","아니오"], answer:1, desc:"대출 사칭도 매우 흔한 수법입니다.", risk:3 },
{ q:"대출약정위반, 보증금 관련 내용을 들었습니까?", choices:["예","아니오"], answer:1, desc:"가짜 금융용어로 속이는 수법입니다.", risk:5 },
{ q:"기존 대출 상환 요구를 받았습니까?", choices:["예","아니오"], answer:1, desc:"대출 사기의 핵심 패턴입니다.", risk:5 },
];

let index = 0;
let score = 0;
let selectedRisks = [];
let highRiskDetected = false;

const intro = document.getElementById("intro");
const quiz = document.getElementById("quiz");
const caseScreen = document.getElementById("caseScreen");
const nextBtn = document.getElementById("nextBtn");

const ytFrame = document.getElementById("ytFrame");
const videoBox = document.getElementById("videoBox");
const startBtn = document.getElementById("startBtn");

document.getElementById("videoBtn").onclick = function(){

    videoBox.style.display = "block";

    ytFrame.src = "";
    setTimeout(()=>{
        ytFrame.src = "https://www.youtube.com/embed/tV-yM5EWJ3k?autoplay=1&mute=1&rel=0";
    },200);

    startBtn.disabled = true;
    startBtn.innerText = "영상 시청 중... (10초 후 시작 가능)";

    setTimeout(()=>{
    startBtn.disabled = false;
    startBtn.innerText = "진단 시작";
    startBtn.classList.add("blink"); // 🔥 추가
},10000);
};

document.getElementById("externalBtn").onclick = function(){
    window.open("https://youtu.be/tV-yM5EWJ3k", "_blank");
};

startBtn.onclick = () => {
    intro.classList.add("hidden");
    caseScreen.classList.remove("hidden");
};

document.getElementById("caseNextBtn").onclick = () => {
    caseScreen.classList.add("hidden");
    quiz.classList.remove("hidden");
    index = 0;
    score = 0;
    selectedRisks = [];
    highRiskDetected = false;
    loadQ();
};

function loadQ(){
    const q = questions[index];
    document.getElementById("question").innerText = q.q;

    const c = document.getElementById("choices");
    c.innerHTML = "";

    q.choices.forEach((t,i)=>{
        let b = document.createElement("button");
        b.className = "choiceBtn";
        b.innerText = t;
        b.onclick = () => answer(i);
        c.appendChild(b);
    });

    document.getElementById("descBox").style.display = "none";
    nextBtn.classList.add("hidden");
}

function answer(i){
    const q = questions[index];

    if(i !== q.answer){
        score += q.risk;
        selectedRisks.push(q.q);
        if(q.risk >= 4){
            highRiskDetected = true;
        }
    }

    document.getElementById("descBox").innerText = q.desc;
    document.getElementById("descBox").style.display = "block";

    /* 🔥 다음 버튼 지연 활성화 */
    nextBtn.classList.add("hidden");
    nextBtn.disabled = true;

    setTimeout(()=>{
    nextBtn.classList.remove("hidden");
    nextBtn.disabled = false;
    },1500);
}

nextBtn.onclick = () => {
    index++;
    if(index >= questions.length){
        result();
    } else {
        loadQ();
    }
};

function result(){

    quiz.classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    let msg =
        highRiskDetected ? "🚨 고위험 의심"
        : selectedRisks.length > 0 ? "⚠️ 주의 필요"
        : "✅ 안전";

    document.getElementById("result").innerText = msg;

    let detailText = "<b>⚠️ 해당된 위험 항목</b><br>";

    if(selectedRisks.length === 0){
        detailText += "해당 없음";
        document.getElementById("preventionMsg").innerHTML = "✅ 현재 위험 징후 없음";
    } else {
        selectedRisks.forEach((item, idx)=>{
            detailText += (idx+1) + ". " + item + "<br>";
        });

        document.getElementById("preventionMsg").innerHTML =
            highRiskDetected
            ? "🚨 피싱 피해 의심!! 즉시 112 신고 및 금융기관 확인"
            : "⚠️ 의심 정황 있음, 주변인과 상의 필요";
    }

    document.getElementById("detailResult").innerHTML = detailText;

    const detailBox = document.getElementById("detailResult");

    if(highRiskDetected){
        detailBox.className = "dangerBox";
    } else if(selectedRisks.length > 0){
        detailBox.className = "warnBox";
    } else {
        detailBox.className = "safeBox";
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

</script>

</body>
</html>
